server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — any request that doesn't match a built file falls back
  # to index.html so client-side routing keeps working. Static assets keep
  # their hashed filenames and are immutable.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache the hashed Vite assets aggressively — filenames carry a content
  # hash so a content change becomes a new URL.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Web Serial (used by the Run feature) requires a Secure Context. That's
  # provided by HTTPS at the deployment edge; on localhost the API also
  # works over plain HTTP. Add HSTS via a reverse proxy / load balancer
  # rather than this server block so it's centralised.

  # Don't serve hidden / vcs files.
  location ~ /\. {
    deny all;
  }
}
